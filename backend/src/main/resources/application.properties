# Server configuration
server.port=8080
server.servlet.context-path=/

# Application configuration
spring.application.name=xp-game-backend

# CORS configuration
cors.allowed-origins=http://localhost:5173,http://frontend:5173

# Logging configuration
logging.level.com.hackathon.xpgame=DEBUG
logging.level.org.springframework.web=INFO

# TODO: Add more configuration properties as needed

# Enable H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# H2 database configuration
spring.datasource.url=jdbc:h2:mem:xpgame
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update