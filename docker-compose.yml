services:
    backend:
        build: ./backend
        ports:
            - "8080:8080"
        environment:
            - SPRING_PROFILES_ACTIVE=dev
        volumes:
            - ./backend:/app
        working_dir: /app

    frontend:
        build: ./frontend
        ports:
            - "5173:5173"
        environment:
            - VITE_API_BASE_URL=http://localhost:8080
        volumes:
            - ./frontend:/app
            - /app/node_modules
        working_dir: /app
        command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
        depends_on:
            - backend
